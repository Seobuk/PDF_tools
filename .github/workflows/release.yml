name: Release

on:
  push:
    branches: [main]
    paths: ['.release-trigger']
  workflow_dispatch:
    inputs:
      tag:
        description: '릴리즈 태그 (예: v1.2.1)'
        required: true

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG=$(tr -d '[:space:]' < .release-trigger)
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          awk -v tag="$TAG" 'index($0, "## " tag " ") == 1 {flag=1; next} /^## /{flag=0} flag' RELEASE_NOTES.md > notes.md
          if [ ! -s notes.md ]; then echo "PDF Tools $TAG" > notes.md; fi
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "PDF Tools $TAG" \
            --notes-file notes.md

  build-exe:
    needs: create-release
    runs-on: windows-latest
    env:
      TAG: ${{ needs.create-release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build executable
        run: pyinstaller --noconsole --onefile --name PDF_Tools main.py
      - name: Sign executable
        env:
          CERT_B64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if (-not $env:CERT_B64) {
            Write-Host "WINDOWS_CERT_PFX_BASE64 시크릿이 설정되지 않아 코드 서명을 건너뜁니다."
            exit 0
          }
          $certPath = Join-Path $env:RUNNER_TEMP "cert.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:CERT_B64))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -like "*x64*" } |
            Select-Object -Last 1 -ExpandProperty FullName
          & $signtool sign /f $certPath /p $env:CERT_PASSWORD /t http://timestamp.digicert.com /fd SHA256 dist/PDF_Tools.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $signtool verify /pa dist/PDF_Tools.exe
          Remove-Item $certPath
      - name: Upload executable to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$env:TAG" dist/PDF_Tools.exe --clobber
